services:
  db:
    image: postgres:16-alpine
    container_name: porthub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: porthub
    ports:
      # Host 5434 → container 5432 (avoids a local Postgres already on 5432).
      - "5434:5432"
    volumes:
      - porthub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d porthub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  porthub_pgdata:
